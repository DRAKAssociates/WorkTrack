  :root{
    --color-background-primary:#ffffff;
    --color-background-secondary:#F4F3EF;
    --color-background-tertiary:#EDEBE4;
    --color-text-primary:#1A1A18;
    --color-text-secondary:#5F5E5A;
    --color-text-tertiary:#8C8B86;
    --color-border-tertiary:rgba(0,0,0,0.10);
    --color-border-secondary:rgba(0,0,0,0.20);
    --border-radius-md:8px;
    --border-radius-lg:12px;
    --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;

  *{box-sizing:border-box}
  body{margin:0;padding:0;font-family:var(--font-sans);background:var(--color-background-tertiary)}

  /* Login screen */
  .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px}
  .login-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:40px 48px;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,0.08);width:360px}

  .login-sub{font-size:13px;color:var(--color-text-tertiary);margin-bottom:28px}
  .login-btn{width:100%;padding:11px;background:#534AB7;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
  .login-btn:hover{background:#3C3489}
  .login-btn.secondary{background:transparent;color:#534AB7;border:0.5px solid #534AB7}
  .login-btn.secondary:hover{background:#EEEDFE}
  .login-divider{font-size:11px;color:var(--color-text-tertiary);margin:8px 0}

  /* Preparer picker */
  .picker-list{display:flex;flex-direction:column;gap:8px;margin-top:16px}

  .spinner{width:32px;height:32px;border:3px solid #EEEDFE;border-top-color:#534AB7;border-radius:50%;animation:spin 0.8s linear infinite}

const AVC = ['#534AB7','#0F6E56','#993C1D','#185FA5','#854F0B'];

// ── MSAL Auth setup ──────────────────────────────────────────
const msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/drakassociates.onmicrosoft.com`,
    redirectUri: window.location.href.split('?')[0],
  },
  cache: { cacheLocation: 'sessionStorage' }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);
const SCOPES = ['User.Read','Files.ReadWrite','Sites.ReadWrite.All','Files.ReadWrite.All'];

// ── SharePoint Graph API helpers ─────────────────────────────
async function getToken(){
  const accounts = msalInstance.getAllAccounts();
  if(!accounts.length) throw new Error('Not signed in');
  try{
    const resp = await msalInstance.acquireTokenSilent({scopes:SCOPES, account:accounts[0]});
    return resp.accessToken;
  } catch(e){
    const resp = await msalInstance.acquireTokenPopup({scopes:SCOPES});
    return resp.accessToken;
  }
}

async function graphGet(url){
  const token = await getToken();
  const resp = await fetch('https://graph.microsoft.com/v1.0'+url,{
    headers:{Authorization:'Bearer '+token}
  });
  if(!resp.ok) throw new Error('Graph GET failed: '+url+' '+resp.status);
  return resp.json();
}

async function graphPut(url, body){
  const token = await getToken();
  const resp = await fetch('https://graph.microsoft.com/v1.0'+url,{
    method:'PUT',
    headers:{Authorization:'Bearer '+token,'Content-Type':'application/octet-stream'},
    body
  });
  if(!resp.ok) throw new Error('Graph PUT failed: '+url+' '+resp.status);
  return resp;
}

// ── Excel read/write via Graph API ───────────────────────────
// Get SharePoint site drive item for a file
// Resolve files via SharePoint site and personal OneDrive paths
async function getSharedFileUrl(){
  const site = await graphGet('/sites/drakassociates.sharepoint.com:/sites/DRAKFiles');
  const drive = await graphGet("/sites/"+site.id+"/drive");
  // Try direct path first (faster and more reliable)
  try{
    const item = await graphGet("/drives/"+drive.id+"/root:/Clients/Tracker/WorkTrack/worktrack_shared.xlsx");
    if(item && item.id) return {driveId: drive.id, itemId: item.id};
  } catch(_){}
  // Fallback: search the drive
  const search = await graphGet("/drives/"+drive.id+"/root/search(q='worktrack_shared.xlsx')");
  const file = search.value.find(f=>f.name==='worktrack_shared.xlsx');
  if(!file) throw new Error('worktrack_shared.xlsx not found in SharePoint');
  return {driveId: drive.id, itemId: file.id};
}

async function getPrivateFileUrl(){
  const fname = CONFIG.privateFileName;

  // Strategy 1: SharePoint site library (most reliable — use if you've moved the file there)
  if(CONFIG.privateSitePath){
    try{
      const site = await graphGet('/sites/'+CONFIG.sharedSiteHost+':'+CONFIG.privateSitePath);
      const drive = await graphGet('/sites/'+site.id+'/drive');
      // Try direct path first
      const folderPath = (CONFIG.privateLibraryPath||'').replace(/\/$/,'');
      try{
        const item = await graphGet('/drives/'+drive.id+'/root:'+folderPath+'/'+fname);
        if(item && item.id) return {driveId: drive.id, itemId: item.id};
      } catch(_){}
      // Fallback: search within the drive
      const search = await graphGet('/drives/'+drive.id+'/root/search(q=\''+fname+'\')');
      const file = (search.value||[]).find(f=>f.name===fname);
      if(file) return {driveId: drive.id, itemId: file.id};
    } catch(e1){
      console.warn('Private file: SharePoint strategy failed', e1.message);
    }
  }

  // Strategy 2: /me/drive search (works when logged-in user owns the file)
  try{
    const drive = await graphGet('/me/drive');
    const search = await graphGet('/me/drive/root/search(q=\''+fname+'\')');
    const file = (search.value||[]).find(f=>f.name===fname);
    if(file) return {driveId: drive.id, itemId: file.id};
  } catch(e2){
    console.warn('Private file: /me/drive strategy failed', e2.message);
  }

  // Strategy 3: specific user's OneDrive (requires Files.ReadWrite.All)
  if(CONFIG.privateUserLogin){
    try{
      const userLogin = CONFIG.privateUserLogin.replace(/_/g,'.');
      const drive = await graphGet('/users/'+userLogin+'/drive');
      const search = await graphGet('/users/'+userLogin+'/drive/root/search(q=\''+fname+'\')');
      const file = (search.value||[]).find(f=>f.name===fname);
      if(file) return {driveId: drive.id, itemId: file.id};
    } catch(e3){
      console.warn('Private file: user drive strategy failed', e3.message);
    }
  }

  console.warn('Private file not found via any strategy — continuing without it');
  return null;
}


async function downloadExcel(driveId, itemId, userId){
  const token = await getToken();
  // Always use driveId/itemId now (both shared and private resolved via /shares)
  const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}/content`;
  const resp = await fetch(url,{headers:{Authorization:'Bearer '+token}});
  if(!resp.ok) throw new Error('Download failed '+resp.status);
  const buffer = await resp.arrayBuffer();
  return XLSX.read(buffer,{type:'array'});
}

async function uploadExcel(wb, driveId, itemId, userId){
  const buffer = XLSX.write(wb,{type:'array',bookType:'xlsx'});
  // Always use driveId/itemId now
  await graphPut(`/drives/${driveId}/items/${itemId}/content`, buffer);
}

// ── Parse Excel sheets into app data structures ───────────────
function parseSheet(wb, sheetName){
  const ws = wb.Sheets[sheetName];
  if(!ws) return [];
  return XLSX.utils.sheet_to_json(ws,{defval:''});
}

function sheetToWorkbook(wb, sheetName, rows, columns){
  const ws = XLSX.utils.json_to_sheet(rows,{header:columns});
  ws['!cols'] = columns.map(c=>({wch:Math.max(12,c.length+2)}));
  wb.Sheets[sheetName] = ws;
  if(!wb.SheetNames.includes(sheetName)) wb.SheetNames.push(sheetName);
}

function rowsToApp(sharedWb, privateWb, isReviewer){
  const clients = parseSheet(sharedWb,'Clients').map(r=>({id:r.ID,name:r.Name,defaultFreq:r.DefaultFreq||'none'}));
  const taskDefs = parseSheet(sharedWb,'TaskTypes').map(r=>({id:r.ID,label:r.Label,group:r.Group,bucket:r.Bucket,isCompliance:r.IsCompliance==='true'||r.IsCompliance===true||r.IsCompliance==='TRUE'}));
  // Read Groups from dedicated sheet — fall back to deriving from TaskTypes only if sheet missing
  let groups = [];
  const groupRows = parseSheet(sharedWb,'Groups');
  if(groupRows.length>0){
    groups = groupRows.map(r=>({id:r.ID, label:r.Label})).filter(g=>g.id&&g.label);
  } else {
    // Legacy fallback: derive from TaskType group field — only works if IDs happen to be readable names
    const seen = new Set();
    taskDefs.forEach(t=>{
      if(t.group && !seen.has(t.group)){
        seen.add(t.group);
        groups.push({id:t.group, label:t.group}); // best effort — will show ID as label
      }
    });
  }
  // Shared People sheet — ID + Name only (preparers can see this, nothing sensitive)
  const sharedPeople = parseSheet(sharedWb,'People').map(r=>({
    id:r.ID, name:r.Name,
    email:'', role:'preparer', accountType:'shared' // safe defaults, overridden by private
  }));
  // Private People sheet — full details: email, role, accountType (reviewers only)
  const privatePeople = parseSheet(privateWb,'People').map(r=>({
    id:r.ID, name:r.Name, email:(r.Email||'').toLowerCase().trim(),
    role:r.Role||'preparer', accountType:r.AccountType||'shared'
  }));
  // Merge: start with shared names, private overrides everything
  const peopleMap = {};
  sharedPeople.forEach(p=>{ peopleMap[p.id]=p; });
  privatePeople.forEach(p=>{ peopleMap[p.id]={...peopleMap[p.id],...p}; }); // private wins
  const people = Object.values(peopleMap);
  const settings = {};
  parseSheet(sharedWb,'Settings').forEach(r=>{settings[r.Key]=r.Value;});

  const refLabels = {
    ref1: settings.RefLabel1||'Reference 1',
    ref2: settings.RefLabel2||'Reference 2',
    ref3: settings.RefLabel3||'Reference 3',
  };

  const parseAssignments = (wb, isPrivate) => {
    const rows = parseSheet(wb,'Assignments');
    const subs = parseSheet(wb,'SubTasks');
    return rows.map(r=>({
      id:r.ID, tid:r.TaskTypeID, cid:r.ClientID||null,
      period:r.Period||null, due:r.DueDate||'', prep:r.Preparer||'', rev:r.Reviewer||'',
      pi:0, ri:0, status:r.Status||'pending', freq:r.Frequency||'none',
      filedDate:r.FiledDate||undefined, ackNo:r.AckNumber||undefined,
      fy:r.FY||undefined, ref1:r.Ref1||undefined, ref2:r.Ref2||undefined, ref3:r.Ref3||undefined,
      nextHearing:r.NextHearing||undefined, hearingNote:r.HearingNote||undefined,
      hearingLog: [], // loaded separately from HearingLog sheet
      closedWithoutReview:r.ClosedWithoutApproval==='true'||r.ClosedWithoutApproval===true,
      resignNote:r.ResignNote||undefined,
      isPrivate: !!isPrivate,
      st: subs.filter(s=>s.AssignmentID===r.ID).map(s=>({id:s.ID,t:s.Text,d:s.Done==='true'||s.Done===true}))
    }));
  };

  const sharedAssignments = parseAssignments(sharedWb, false);
  const privateAssignments = isReviewer ? parseAssignments(privateWb, true) : [];
  const allAssignments = [...sharedAssignments, ...privateAssignments];

  // Load HearingLog sheet and attach entries to assignments
  const hearingLogRows = parseSheet(sharedWb,'HearingLog');
  const hearingLogMap = {};
  hearingLogRows.forEach(r=>{
    if(!hearingLogMap[r.AssignmentID]) hearingLogMap[r.AssignmentID]=[];
    hearingLogMap[r.AssignmentID].push({
      prevDate:r.PrevDate||'', newDate:r.NewDate||'',
      note:r.Note||'', changedOn:r.ChangedOn||'', changedBy:r.ChangedBy||''
    });
  });
  allAssignments.forEach(r=>{ r.hearingLog = hearingLogMap[r.id]||[]; });

  // Resolve avatar indices
  const teamMap = {};
  people.forEach((p,i)=>{ teamMap[p.id]=i; });
  allAssignments.forEach(r=>{
    r.pi = teamMap[r.prep]??0;
    r.ri = teamMap[r.rev]??0;
  });

  return {clients, taskDefs, groups, people, settings, refLabels, ct: allAssignments};
}

function cleanAppData(data){
  // Remove assignments that reference non-existent task types
  const taskIds = new Set(data.taskDefs.map(t=>t.id));
  const cleanCt = data.ct.filter(r=>taskIds.has(r.tid));
  if(cleanCt.length !== data.ct.length){
    console.warn('Removed '+(data.ct.length-cleanCt.length)+' orphaned assignment(s) referencing missing task types');
  }
  // Fix groups that have ID as label (legacy corrupt data) — try to find a real name
  // If group label looks like an ID (no spaces, contains _), mark it as needing rename
  const cleanGroups = data.groups.map(g=>{
    if(g.label === g.id || /^[a-z]+_[a-z0-9]+$/.test(g.label)){
      // Try to infer from task types that use this group — can't get name, so flag it
      return {...g, label:'(unnamed category — please rename)', needsRename:true};
    }
    return g;
  });
  return {...data, ct:cleanCt, groups:cleanGroups};
}

function appToRows(ct, taskDefs, isReviewer){
  const ASSIGN_COLS = ['ID','TaskTypeID','ClientID','Period','DueDate','Preparer','Reviewer',
    'Status','Frequency','FiledDate','AckNumber','FY','Ref1','Ref2','Ref3','NextHearing','HearingNote','ClosedWithoutApproval','ResignNote'];
  const SUB_COLS = ['ID','AssignmentID','Text','Done'];

  const toAssignRow = r => ({
    ID:r.id, TaskTypeID:r.tid, ClientID:r.cid||'', Period:r.period||'', DueDate:r.due,
    Preparer:r.prep, Reviewer:r.rev, Status:r.status, Frequency:r.freq,
    FiledDate:r.filedDate||'', AckNumber:r.ackNo||'', FY:r.fy||'',
    Ref1:r.ref1||'', Ref2:r.ref2||'', Ref3:r.ref3||'',
    NextHearing:r.nextHearing||'', HearingNote:r.hearingNote||'',
    ClosedWithoutApproval:r.closedWithoutReview?'true':'false',
    ResignNote:r.resignNote||''
  });
  const toSubRows = r => r.st.map(s=>({ID:s.id, AssignmentID:r.id, Text:s.t, Done:s.d?'true':'false'}));

  const sharedRows = ct.filter(r=>!r.isPrivate);
  const privateRows = ct.filter(r=>r.isPrivate);

  const sharedAssignRows = sharedRows.map(toAssignRow);
  const sharedSubRows = sharedRows.flatMap(toSubRows);
  const privateAssignRows = privateRows.map(toAssignRow);
  const privateSubRows = privateRows.flatMap(toSubRows);

  return {sharedAssignRows, sharedSubRows, privateAssignRows, privateSubRows, ASSIGN_COLS, SUB_COLS};
}

// ── Main React App ────────────────────────────────────────────
(function(){
function boot(){
const e = React.createElement;
const useState = React.useState;
const useEffect = React.useEffect;
const useRef = React.useRef;

function App(){
  const [phase, setPhase] = useState('init'); // init|login|preparer-pick|loading|app|error
  const [currentUser, setCurrentUser] = useState(null); // {id, name, role, isReviewer, email}
  const [appData, setAppData] = useState(null);
  const [sharedFileRef, setSharedFileRef] = useState(null);
  const [privateFileRef, setPrivateFileRef] = useState(null);
  const [sharedWb, setSharedWb] = useState(null);
  const [privateWb, setPrivateWb] = useState(null);
  const [saveState, setSaveState] = useState('idle'); // idle|saving|saved|error
  const saveTimer = useRef(null);
  const pendingSave = useRef(false);

  useEffect(()=>{
    msalInstance.initialize().then(()=>{
      // Handle redirect after login
      msalInstance.handleRedirectPromise().then(resp=>{
        if(resp && resp.account){
          handleMsalLogin(resp.account, resp.accessToken);
        } else {
          const accounts = msalInstance.getAllAccounts();
          if(accounts.length){
            handleMsalLogin(accounts[0], null);
          } else {
            setPhase('login');
          }
        }
      }).catch(()=>setPhase('login'));
    });
  },[]);

  const handleMsalLogin = async (account, token) => {
    setPhase('loading');
    try{
      const email = account.username;
      const isReviewer = CONFIG.reviewerEmails.some(r=>r.toLowerCase()===email.toLowerCase());
      const displayName = account.name||email;

      // Temporarily set currentUser — id will be resolved after People sheet loads
      setCurrentUser({
        id: null, // resolved after loadData
        name: displayName,
        email,
        isReviewer,
        role: isReviewer ? 'reviewer' : 'preparer'
      });

      await loadData(isReviewer, email);
    } catch(err){
      console.error(err);
      setPhase('error');
    }
  };

  const signInWithMicrosoft = async () => {
    try{
      await msalInstance.loginPopup({scopes:SCOPES});
      const accounts = msalInstance.getAllAccounts();
      if(accounts.length) await handleMsalLogin(accounts[0], null);
    } catch(e){ console.error(e); }
  };

  const loadData = async (isReviewer, email) => {
    setPhase('loading');
    try{
      // Load shared file
      const sharedRef = await getSharedFileUrl();
      setSharedFileRef(sharedRef);
      const sWb = await downloadExcel(sharedRef.driveId, sharedRef.itemId, null);
      setSharedWb(sWb);

      let pWb = null;
      let privateRef = null;
      if(isReviewer){
        try{
          privateRef = await getPrivateFileUrl();
          if(privateRef){
            setPrivateFileRef(privateRef);
            pWb = await downloadExcel(privateRef.driveId, privateRef.itemId, null);
          }
          setPrivateWb(pWb);
        } catch(e){ console.warn('Private file not found, skipping',e); }
      }

      const data = cleanAppData(rowsToApp(sWb, pWb||{Sheets:{},SheetNames:[]}, isReviewer));
      setAppData(data);

      // Resolve person ID from People sheet by exact email match
      if(email && data.people && data.people.length>0){
        const match = data.people.find(p=>p.email && p.email===email.toLowerCase().trim());
        if(match){
          setCurrentUser(prev=>({...prev, id:match.id, name:match.name}));
        } else {
          // Fallback: first reviewer in People sheet (shouldn't happen if emails are set up correctly)
          const firstReviewer = data.people.find(p=>p.role==='reviewer');
          if(firstReviewer) setCurrentUser(prev=>({...prev, id:firstReviewer.id, name:firstReviewer.name}));
          console.warn('No People sheet entry found for email:', email, '— please add email to People sheet');
        }
      }

      // If reviewer, go straight to app. If preparer account, show picker.
      if(isReviewer){
        setPhase('app');
      } else {
        setPhase('preparer-pick');
      }
    } catch(err){
      console.error('Load error:', err);
      setPhase('error');
    }
  };

  const pickPreparer = (person) => {
    // Role is ALWAYS preparer here — reviewer identity requires MS login with reviewer email
    // isReviewer stays false regardless of who is picked
    setCurrentUser(prev=>({...prev, id:person.id, name:person.name, role:'preparer', isReviewer:false}));
    setPhase('app');
  };

  // Core save logic — shared by debounced and immediate paths
  const doSave = async (newCt, newAppData) => {
    setSaveState('saving');
    try{
      const data = newAppData || appData;
      const {sharedAssignRows, sharedSubRows, privateAssignRows, privateSubRows, ASSIGN_COLS, SUB_COLS} = appToRows(newCt||data.ct, data.taskDefs, currentUser?.isReviewer);

      // Write shared workbook
      const sWb = sharedWb || XLSX.read('',{type:'string'});
      sheetToWorkbook(sWb,'Assignments',sharedAssignRows,ASSIGN_COLS);
      sheetToWorkbook(sWb,'SubTasks',sharedSubRows,SUB_COLS);

      // Write clients, taskTypes, groups, people back too
      sheetToWorkbook(sWb,'Clients',data.clients.map(c=>({ID:c.id,Name:c.name,DefaultFreq:c.defaultFreq})),['ID','Name','DefaultFreq']);
      sheetToWorkbook(sWb,'TaskTypes',data.taskDefs.map(t=>({ID:t.id,Label:t.label,Group:t.group||'',Bucket:t.bucket,IsCompliance:t.isCompliance?'true':'false'})),['ID','Label','Group','Bucket','IsCompliance']);
      sheetToWorkbook(sWb,'Groups',data.groups.map(g=>({ID:g.id,Label:g.label})),['ID','Label']);
      // HearingLog — append-only audit trail, always written in full
      const allHearingLogs = (newCt||data.ct||[]).flatMap(r=>(r.hearingLog||[]).map(h=>({AssignmentID:r.id,...h})));
      sheetToWorkbook(sWb,'HearingLog',allHearingLogs,['AssignmentID','PrevDate','NewDate','Note','ChangedOn','ChangedBy']);
      // Shared People — ID + Name only, nothing sensitive
      sheetToWorkbook(sWb,'People',
        data.people.map(p=>({ID:p.id, Name:p.name})),
        ['ID','Name']);
      // Private People — full details (email, role, accountType) — always written by reviewer
      if(currentUser?.isReviewer && privateWb){
        sheetToWorkbook(privateWb,'People',
          data.people.map(p=>({ID:p.id, Name:p.name, Email:p.email||'', Role:p.role||'preparer', AccountType:p.accountType||'shared'})),
          ['ID','Name','Email','Role','AccountType']);
      }

      await uploadExcel(sWb, sharedFileRef?.driveId, sharedFileRef?.itemId, null);

      // Write private workbook if reviewer
      if(currentUser?.isReviewer && privateWb && privateFileRef){
        const pWb = privateWb;
        sheetToWorkbook(pWb,'Assignments',privateAssignRows,ASSIGN_COLS);
        sheetToWorkbook(pWb,'SubTasks',privateSubRows,SUB_COLS);
        await uploadExcel(pWb, privateFileRef.driveId, privateFileRef.itemId, null);
      }
      setSaveState('saved');
    } catch(err){
      console.error('Save failed', err);
      setSaveState('error');
    }
  };

  // Debounced auto-save — for routine edits (3 second delay)
  const triggerSave = async (newCt, newAppData) => {
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>doSave(newCt, newAppData), 3000);
  };

  // Immediate save — for critical writes like hearing log entries
  const immediateSave = async (newCt, newAppData) => {
    if(saveTimer.current) clearTimeout(saveTimer.current); // cancel pending debounced save
    await doSave(newCt, newAppData);
  };

  const updateData = (patch) => {
    setAppData(prev=>{
      const next = {...prev,...patch};
      triggerSave(next.ct, next);
      return next;
    });
  };

  // ── Login screen ─────────────────────────────────────────
  if(phase==='login'){
    return e('div',{className:'login-screen'},
      e('div',{className:'login-card'},
        e('div',{className:'login-logo'},'WorkTrack'),
        e('div',{className:'login-sub'},CONFIG.orgName),
        e('button',{className:'login-btn',onClick:signInWithMicrosoft},
          e('i',{className:'ti ti-brand-microsoft','aria-hidden':'true'}),
          'Sign in with Microsoft'
        ),
        e('div',{style:{fontSize:10,color:'var(--color-text-tertiary)',marginTop:8}},'Use your '+CONFIG.orgName+' Microsoft account')
      )
    );
  }

  // ── Preparer picker ───────────────────────────────────────
  if(phase==='preparer-pick'){
    // Filter using CONFIG.reviewerIds — hardcoded in HTML, cannot be spoofed via Excel
    const preparers = (appData?.people||[]).filter(p=>!CONFIG.reviewerIds.includes(p.id));
    return e('div',{className:'login-screen'},
      e('div',{className:'login-card'},
        e('div',{className:'login-logo'},'WorkTrack'),
        e('div',{className:'login-sub'},'Who are you?'),
        e('div',{style:{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:12,textAlign:'center'}},'Reviewers — please use your own Microsoft account to sign in.'),
        e('div',{className:'picker-list'},
          preparers.map((p,i)=>e('div',{key:p.id,className:'picker-item',onClick:()=>pickPreparer(p)},
            e('div',{className:'picker-avatar',style:{background:AVC[i%5]}},p.name.slice(0,2).toUpperCase()),
            p.name
          ))
        )
      )
    );
  }

  // ── Loading ───────────────────────────────────────────────
  if(phase==='loading'||phase==='init'){
    return e('div',{className:'loading-screen'},
      e('div',{className:'spinner'}),
      e('div',{className:'loading-text'},phase==='init'?'Starting up…':'Loading your data from SharePoint…')
    );
  }

  // ── Error ─────────────────────────────────────────────────
  if(phase==='error'){
    return e('div',{className:'loading-screen'},
      e('div',{style:{fontSize:32,marginBottom:8}},'⚠️'),
      e('div',{style:{fontSize:14,color:'var(--color-text-primary)',marginBottom:4}},'Could not connect to SharePoint'),
      e('div',{style:{fontSize:12,color:'var(--color-text-tertiary)',marginBottom:16,textAlign:'center',maxWidth:300}},'Check that your Client ID and Tenant ID are correctly pasted in the CONFIG section at the top of this file, and that you have internet access.'),
      e('button',{onClick:()=>setPhase('login'),style:{padding:'8px 16px',background:'#534AB7',color:'#fff',border:'none',borderRadius:'var(--border-radius-md)',cursor:'pointer',fontSize:13}},'Try again')
    );
  }

  // ── Main app ──────────────────────────────────────────────
  if(phase==='app' && appData){
    return e(React.Fragment,null,
      e(SaveIndicator,{state:saveState}),
      e(WorkTrackApp,{
        initialData:appData,
        currentUser,
        onDataChange:(patch)=>{
          // Update local appData and trigger save to SharePoint
          setAppData(prev=>({...prev,...patch}));
          triggerSave(patch.ct, {...appData,...patch});
        },
        onSignOut:()=>{
          msalInstance.logoutPopup();
          setPhase('login');
          setCurrentUser(null);
          setAppData(null);
        }
      })
    );
  }

  return e('div',{className:'loading-screen'},e('div',{className:'spinner'}));
}

}

const MONTH_MAP={'Jan':0,'Feb':1,'Mar':2,'Apr':3,'May':4,'Jun':5,'Jul':6,'Aug':7,'Sep':8,'Oct':9,'Nov':10,'Dec':11};
const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
// Indian FY quarter ends: Jun, Sep, Dec, Mar
const QUARTER_END_MONTHS=[5,8,11,2];
// Indian FY year end: Mar
const YEAR_END_MONTH=2;

function monthIsQuarterEnd(mi){ return QUARTER_END_MONTHS.includes(mi); }
function monthIsYearEnd(mi){ return mi===YEAR_END_MONTH; }

function nextPeriod(period, freq){
  if(!period) return '';
  if(freq==='monthly'){
    const m=period.match(/^([A-Za-z]{3})\s(\d{4})$/);
    if(m){
      let mi=MONTH_MAP[m[1]], yr=parseInt(m[2]);
      mi++; if(mi>11){mi=0;yr++;}
      return MONTH_NAMES[mi]+' '+yr;
    }
  }
  if(freq==='quarterly'){
    const m=period.match(/^Q(\d) FY(\d+)$/);
    if(m){
      let q=parseInt(m[1]), fy=parseInt(m[2]);
      q++; if(q>4){q=1;fy++;}
      return 'Q'+q+' FY'+fy;
    }
  }
  if(freq==='yearly'){
    const m=period.match(/^AY (\d+)-(\d+)$/);
    if(m){
      let a=parseInt(m[1])+1, b=parseInt(m[2])+1;
      return 'AY '+a+'-'+String(b).slice(-2);
    }
  }
  return period;
}

function periodForMonth(monthIdx, year, freq){
  if(freq==='monthly'){
    return MONTH_NAMES[monthIdx]+' '+year;
  }
  if(freq==='quarterly'){
    if(!monthIsQuarterEnd(monthIdx)) return null;
    const qIdxMap={5:1,8:2,11:3,2:4};
    const q=qIdxMap[monthIdx];
    const fy = monthIdx<=2 ? year : year+1;
    return 'Q'+q+' FY'+String(fy).slice(-2);
  }
  if(freq==='yearly'){
    if(!monthIsYearEnd(monthIdx)) return null;
    const startYr=year-1;
    return 'AY '+startYr+'-'+String(year).slice(-2);
  }
  return null;
}

// Multi-dimensional period filter helpers
function parsePeriod(period){
  if(!period) return {};
  let m=period.match(/^([A-Za-z]{3}) (\d{4})$/);
  if(m){
    const mi=MONTH_MAP[m[1]], yr=parseInt(m[2]);
    const fyStart=mi<=2?yr-1:yr;
    const fy='FY'+String(fyStart).slice(-2)+'-'+String(fyStart+1).slice(-2);
    const qNum=mi<=2?4:mi<=5?1:mi<=8?2:3;
    return {month:m[1], quarter:'Q'+qNum, fy};
  }
  m=period.match(/^Q(\d) FY(\d+)$/);
  if(m){
    const fyEnd=parseInt(m[2]);
    return {quarter:'Q'+m[1], fy:'FY'+String(fyEnd-1).slice(-2)+'-'+String(fyEnd).slice(-2)};
  }
  m=period.match(/^AY (\d+)-(\d+)$/);
  if(m) return {fy:'FY'+m[1].slice(-2)+'-'+m[2]};
  return {};
}
function periodMatchesFilter(period, f){
  if(!period) return (f.fy||'all')==='all' && (f.quarter||'all')==='all' && (f.month||'all')==='all';
  const p=parsePeriod(period);
  // FY filter: match against Indian FY e.g. "FY25-26"
  if((f.fy||'all')!=='all'){
    const pFY = p.fy || periodToFY(period);
    if(pFY !== f.fy) return false;
  }
  if((f.quarter||'all')!=='all' && p.quarter!==f.quarter) return false;
  if((f.month||'all')!=='all' && p.month!==f.month) return false;
  return true;
}
// Parse any due date string into a JS Date (best effort)
function parseDueDate(due){
  if(!due) return null;
  // ISO format: 2026-07-20
  if(/^\d{4}-\d{2}-\d{2}$/.test(due)) return new Date(due+'T00:00:00');
  // "20 Jul 2026" or "20 Jul"
  const months={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const m1 = due.match(/^(\d{1,2})\s+([A-Za-z]{3})(?:\s+(\d{4}))?$/);
  if(m1){
    const yr = m1[3] ? parseInt(m1[3]) : new Date().getFullYear();
    const mo = months[m1[2].toLowerCase()];
    if(mo!==undefined) return new Date(yr, mo, parseInt(m1[1]));
  }
  // "Jul 20" or "Jul 20 2026"
  const m2 = due.match(/^([A-Za-z]{3})\s+(\d{1,2})(?:\s+(\d{4}))?$/);
  if(m2){
    const yr = m2[3] ? parseInt(m2[3]) : new Date().getFullYear();
    const mo = months[m2[1].toLowerCase()];
    if(mo!==undefined) return new Date(yr, mo, parseInt(m2[2]));
  }
  const d = new Date(due);
  return isNaN(d) ? null : d;
}

// Returns days until due: negative = overdue, 0 = today, positive = future
function daysUntilDue(due){
  const d = parseDueDate(due);
  if(!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

// Urgency bucket key for a days value
function urgencyBucket(days){
  if(days===null) return 'nodate';
  if(days < -30)  return 'over30';
  if(days < -10)  return 'over10';
  if(days < -1)   return 'over2';
  if(days <= 1)   return 'due01';   // overdue 0-1 or due today/tomorrow
  if(days <= 3)   return 'due23';
  if(days <= 10)  return 'due410';
  if(days <= 30)  return 'due1130';
  return 'due30p';
}

// Returns the effective due date for urgency — earlier of due date and next hearing (for assessments)
function effectiveDue(due, nextHearing){
  const d1 = daysUntilDue(due);
  const d2 = daysUntilDue(nextHearing);
  if(d1===null) return d2;
  if(d2===null) return d1;
  return Math.min(d1, d2);
}

// Human readable due label for display on task row
function dueBadge(due, status, nextHearing){
  if(status==='done'||status==='cancelled') return null;
  const hearingDays = daysUntilDue(nextHearing);
  const dueDays = daysUntilDue(due);
  // Show hearing badge if it's sooner
  if(hearingDays!==null && (dueDays===null || hearingDays <= dueDays)){
    const days = hearingDays;
    const prefix = 'Hearing ';
    if(days < 0)  return {label:prefix+'overdue '+Math.abs(days)+'d', color:'#993C1D', bg:'#FAECE7'};
    if(days === 0) return {label:prefix+'today', color:'#C97D00', bg:'#FEF3CD'};
    if(days === 1) return {label:prefix+'tomorrow', color:'#C97D00', bg:'#FEF3CD'};
    if(days <= 3)  return {label:prefix+'in '+days+'d', color:'#8B6D00', bg:'#FEF3CD'};
    if(days <= 10) return {label:prefix+'in '+days+'d', color:'#0F6E56', bg:'#E6F4F1'};
    return null;
  }
  const days = dueDays;
  if(days===null) return null;
  if(days < 0)  return {label:'Overdue '+Math.abs(days)+'d', color:'#993C1D', bg:'#FAECE7'};
  if(days === 0) return {label:'Due today', color:'#C97D00', bg:'#FEF3CD'};
  if(days === 1) return {label:'Due tomorrow', color:'#C97D00', bg:'#FEF3CD'};
  if(days <= 3)  return {label:'Due in '+days+'d', color:'#8B6D00', bg:'#FEF3CD'};
  if(days <= 10) return {label:'Due in '+days+'d', color:'#0F6E56', bg:'#E6F4F1'};
  return null;
}

const BLANK_FILTER={fy:'all',quarter:'all',month:'all',status:'all',urgency:'all'};
const MONTHS_LIST=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QUARTERS=['Q1','Q2','Q3','Q4'];

// Best-effort: derive a month label and an Indian FY label from any period string,
// so compliance rows of any shape (Jun 2025 / Q1 FY26 / AY 2025-26) can be filtered by FY/month.
function periodToMonthLabel(period){
  if(!period) return null;
  const m=period.match(/^([A-Za-z]{3})\s(\d{4})$/);
  if(m) return m[1]+' '+m[2];
  return null; // quarterly/yearly periods don't map to a single month
}
function periodToFY(period){
  if(!period) return null;
  let m=period.match(/^([A-Za-z]{3})\s(\d{4})$/);
  if(m){
    const mi=MONTH_MAP[m[1]], yr=parseInt(m[2]);
    const fyStart = mi<=2 ? yr-1 : yr; // Jan-Mar belongs to FY starting previous year (Apr)
    return 'FY'+String(fyStart).slice(-2)+'-'+String(fyStart+1).slice(-2);
  }
  m=period.match(/^Q\d FY(\d+)$/);
  if(m){
    const fyEnd=parseInt(m[1]);
    return 'FY'+String(fyEnd-1).slice(-2)+'-'+String(fyEnd).slice(-2);
  }
  m=period.match(/^AY (\d+)-(\d+)$/);
  if(m) return 'FY'+m[1].slice(-2)+'-'+m[2];
  return null;
}

const STATUS_LABEL_TO_KEY={'pending':'pending','in review':'review','review':'review','approved':'approved','done':'done','cancelled':'cancelled'};
const FREQ_VALID=['none','monthly','quarterly','yearly'];

// Parses raw sheet rows into normalized import records + per-row validation errors.
function parseExcelRows(sheetRows){
  const parsed=[];
  sheetRows.forEach((row,idx)=>{
    const errors=[];
    const clientName=(row['Client']||'').toString().trim();
    const taskLabel=(row['Task Type']||'').toString().trim();
    const workCategory=(row['Work Category']||'').toString().trim();
    const bucket=(row['Bucket']||'recurring').toString().trim().toLowerCase();
    const period=(row['Period']||'').toString().trim();
    const due=(row['Due Date']||'').toString().trim();
    const prep=(row['Preparer']||'').toString().trim().toUpperCase();
    const rev=(row['Reviewer']||'').toString().trim().toUpperCase();
    const statusRaw=(row['Status']||'Pending').toString().trim().toLowerCase();
    const freqRaw=(row['Frequency']||'none').toString().trim().toLowerCase();
    const filedDate=(row['Filed Date']||'').toString().trim();
    const ackNo=(row['Ack Number']||'').toString().trim();
    const fy=(row['FY']||'').toString().trim();
    const ref1=(row['Reference 1']||'').toString().trim();
    const ref2=(row['Reference 2']||'').toString().trim();
    const ref3=(row['Reference 3']||'').toString().trim();

    if(!taskLabel) errors.push('Task Type is required');
    if(!due) errors.push('Due Date is required');
    if(!BUCKETS.some(b=>b.id===bucket)) errors.push('Bucket "'+bucket+'" is not recognized (use recurring/periodical/onetime/assessment)');
    const status=STATUS_LABEL_TO_KEY[statusRaw]||'pending';
    const freq=FREQ_VALID.includes(freqRaw)?freqRaw:'none';

    parsed.push({
      rowNum: idx+2, // +2 because row 1 is header, sheet rows are 0-indexed
      clientName, taskLabel, workCategory, bucket, period: period||null, due, prep, rev,
      status, freq, filedDate, ackNo, fy, ref1, ref2, ref3, errors
    });
  });
  return parsed;
}

      const ref=byClient[cl.id];

      const noPriorInstance = !ref;
      const per=periodForMonth(monthIdx,year,usedFreq);

  const confirm=()=>{
    const selected=rows.filter(r=>r.selected);
    selected.forEach(r=>{
      p.onCreate({id:uid(),tid:td.id,cid:r.cid,period:r.period,due:r.due,prep:r.prep,pi:r.pi,rev:r.rev,ri:r.ri,

// ---------- Add Task modal — unified single flow ----------
function AddTaskModal(p){
  const modalTeam = (p.team && p.team.length) ? p.team : [];

  // ── Task type ──
  const [taskTypeId, setTaskTypeId] = useState('');          // '' = new type being created
  const [taskSearch, setTaskSearch]  = useState('');         // search text in task type field
  const [showTaskDrop, setShowTaskDrop] = useState(false);
  // New task type fields (only shown when taskTypeId === '')
  const [newTaskLabel, setNewTaskLabel] = useState('');
  const [newGroup, setNewGroup]   = useState(p.groups[0]?.id||'');
  const [newBucket, setNewBucket] = useState('recurring');
  const [isCompliance, setIsCompliance] = useState(false);
  const [isAssessment, setIsAssessment] = useState(false);
  // Group inline creation
  const [addingGroup, setAddingGroup] = useState(false);
  const [groupDraft,  setGroupDraft]  = useState('');

  // ── Client ──
  const [clientId, setClientId] = useState('');
  const [noClient, setNoClient] = useState(false);
  const [addingClient, setAddingClient] = useState(false);
  const [clientDraft,  setClientDraft]  = useState('');

  // ── Period ──
  const [fy,    setFy]    = useState('');   // e.g. FY25-26
  const [periodQ, setPeriodQ] = useState('');
  const [periodM, setPeriodM] = useState('');
  const [noPeriod, setNoPeriod] = useState(false);

  // ── Due date ──
  const [due, setDue] = useState('');

  // ── Recurring ──
  const [isRecurring, setIsRecurring] = useState(false);
  const [freq, setFreq] = useState('monthly');

  // ── People ──
  const [prep, setPrep] = useState(modalTeam[0]?.id||'');
  const [rev,  setRev]  = useState(modalTeam[0]?.id||'');

  // ── Error ──
  const [formError, setFormError] = useState('');

  // ── Private (reviewer only) ──
  const [isPrivate, setIsPrivate] = useState(false);

  const lbl  = {fontSize:11,fontWeight:500,color:'var(--color-text-secondary)',marginBottom:4,display:'block'};
  const inp  = {fontSize:12,padding:'7px 9px',border:'0.5px solid var(--color-border-secondary)',borderRadius:'var(--border-radius-md)',background:'var(--color-background-primary)',color:'var(--color-text-primary)',width:'100%',outline:'none'};
  const wrap = {marginBottom:14};
  const sec  = {fontSize:10,fontWeight:600,color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:10,marginTop:18,paddingBottom:4,borderBottom:'0.5px solid var(--color-border-tertiary)'};

  // Derive period string from FY + Q + M
  const buildPeriod=()=>{
    if(!fy) return null;
    const fyShort=fy.replace('FY','');  // e.g. "25-26"
    if(periodM) return periodM+' 20'+fyShort.slice(0,2);  // e.g. "Jun 2025"
    if(periodQ) return periodQ+' FY'+fyShort.slice(-2);   // e.g. "Q1 FY26"
    return fy;
  };

  // Resolve selected task type object
  const selTaskDef = taskTypeId ? p.taskDefs.find(t=>t.id===taskTypeId) : null;
  const isNewType  = !taskTypeId;

  // Filtered task type list for dropdown
  const filteredDefs = p.taskDefs.filter(t=>t.label.toLowerCase().includes(taskSearch.toLowerCase()));

  const handleSubmit=()=>{
    setFormError('');
    // Validate task type
    if(isNewType && !newTaskLabel.trim()){ setFormError('Enter a task type name.'); return; }
    if(isNewType && !newGroup){ setFormError('Select or create a work category.'); return; }
    if(!due){ setFormError('Due date is required.'); return; }
    if(!noClient && !clientId){ setFormError('Select or add a client, or tick "Internal task".'); return; }

    // Auto-create task type if new
    let tid = taskTypeId;
    if(isNewType){
      tid = 'tt_'+uid();
      const bucket = isAssessment ? 'assessment' : newBucket;
      p.onCreateTaskType({id:tid, label:newTaskLabel.trim(), group:newGroup, bucket, isCompliance:(isCompliance||isAssessment)});
    }

    const finalPeriod = noPeriod ? null : buildPeriod();
    const finalClientId = noClient ? null : clientId;
    const pIdx = modalTeam.findIndex(t=>t.id===prep);
    const rIdx = modalTeam.findIndex(t=>t.id===rev);
    p.onAddAssignment({
      id:uid(), tid, cid:finalClientId, period:finalPeriod, due,
      prep, rev, pi:pIdx>=0?pIdx:0, ri:rIdx>=0?rIdx:0,
      status:'pending', od:false,
      freq: isRecurring ? freq : 'none',
      isPrivate: isPrivate && !!p.isReviewer,
      st:[]
    });
    p.onClose();
  };

  return e('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}},
    e('div',{style:{background:'var(--color-background-primary)',borderRadius:'var(--border-radius-lg)',padding:'20px 22px',width:480,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 4px 32px rgba(0,0,0,0.18)'}},

      // Header
      e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}},
        e('div',{style:{fontSize:15,fontWeight:600,color:'var(--color-text-primary)'}},'Add task'),
        e('button',{onClick:p.onClose,style:{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--color-text-tertiary)',padding:4}},'✕')
      ),

      // Error banner
      formError ? e('div',{style:{fontSize:11,color:'#712B13',background:'#FAECE7',border:'0.5px solid #F0997B',borderRadius:'var(--border-radius-md)',padding:'7px 10px',marginBottom:14}},
        '⚠ ', formError) : null,

      // ── SECTION: Task type ──
      e('div',{style:sec},'Task type'),

          ),

        ),

      ) : null,

}

function WorkTrackApp(p){
  // p.initialData = {groups, taskDefs, clients, ct, people, refLabels, settings}
  // p.currentUser = {id, name, isReviewer, email}
  // p.onDataChange = fn(patch) — called whenever data changes, triggers auto-save
  const CURRENT_USER = p.currentUser ? (p.currentUser.id || p.currentUser.email.split('@')[0].toUpperCase()) : 'RK';
  // Override TEAM with real people from SharePoint People sheet
  const TEAM = (p.initialData && p.initialData.people && p.initialData.people.length)
    ? p.initialData.people.map((person,i)=>({id:person.id,name:person.name,idx:i}))
    : [{id:'RK',name:'Raj Kumar',idx:0},{id:'PK',name:'Priya K',idx:1},{id:'AM',name:'Aman M',idx:2}];
  const [groups,setGroups]=useState(p.initialData.groups||INIT_GROUPS);
  const [taskDefs,setTaskDefs]=useState(p.initialData.taskDefs||INIT_TASK_DEFS);
  const [clients,setClients]=useState(p.initialData.clients||INIT_CLIENTS);
  const [ct,setCt]=useState(p.initialData.ct||INIT_CT);
  const [view,setView]=useState('dashboard');
  const [bucket,setBucket]=useState(null);
  const [bucketFilters,setBucketFilters]=useState(()=>{
    const init={};
    BUCKETS.forEach(b=>init[b.id]={...BLANK_FILTER});
    return init;
  });
  const [taskOverrides,setTaskOverrides]=useState({});
  const [expTask,setExpTask]=useState(null);
  const [expCl,setExpCl]=useState(null);
  const [expCC,setExpCC]=useState(null);
  const [expNT,setExpNT]=useState(null);
  const [focusClient,setFocusClient]=useState(null);
  const [clientFilter,setClientFilter]=useState('all');
  const [teamFilter,setTeamFilter]=useState({...BLANK_FILTER});
  const [showAddModal,setShowAddModal]=useState(false);
  const [showAddClientModal,setShowAddClientModal]=useState(false);
  const [editingClient,setEditingClient]=useState(null);
  const [reassignRow,setReassignRow]=useState(null);
  const [selfCompleteRow,setSelfCompleteRow]=useState(null);
  const [cancelRow,setCancelRow]=useState(null); // null=adding new, obj=editing existing
  const [nextOccurDraft,setNextOccurDraft]=useState(null); // {row, period, due}
  const [bulkCreateTask,setBulkCreateTask]=useState(null); // taskDef or null
  const [showExcelModal,setShowExcelModal]=useState(false);
  const [closingPrompt,setClosingPrompt]=useState(null); // {rowId, closeType:'review'|'noReview'}
  const [refLabels,setRefLabels]=useState((p.initialData&&p.initialData.refLabels)||DEFAULT_REF_LABELS);
  const [assessmentFYFilter,setAssessmentFYFilter]=useState('all');
  const [assessmentRefFilter,setAssessmentRefFilter]=useState({field:'all',query:''});
  const [assessmentHideDone,setAssessmentHideDone]=useState(true);
  const [complianceFY,setComplianceFY]=useState('all');
  const [complianceMonth,setComplianceMonth]=useState('all');
  const [complianceTypeFilter,setComplianceTypeFilter]=useState('all'); // taskDef id or 'all'
  const [complianceClientFilter,setComplianceClientFilter]=useState('all'); // client id or 'all'

  const getTaskFilter = td => {
    if(taskOverrides[td.id]) return taskOverrides[td.id];
    return bucketFilters[td.bucket] || {period:'all',status:'all'};
  };
  const filtForTask = (rows, td) => {
    const f=getTaskFilter(td);
    let r=rows;
    const hasPerFilter=(f.fy||'all')!=='all'||(f.quarter||'all')!=='all'||(f.month||'all')!=='all';
    if(hasPerFilter) r=r.filter(x=>periodMatchesFilter(x.period, f));
    if((f.status||'all')!=='all') r=r.filter(x=>x.status===f.status);
    if((f.urgency||'all')!=='all') r=r.filter(x=>urgencyBucket(effectiveDue(x.due, x.nextHearing))===f.urgency);
    return r;
  };
  const tStats = td => { const rows=filtForTask(ct.filter(x=>x.tid===td.id),td); return {total:rows.length,done:rows.filter(x=>x.status==='done').length,pending:rows.filter(x=>x.status==='pending').length,review:rows.filter(x=>x.status==='review').length,approved:rows.filter(x=>x.status==='approved').length}; };
  const bStats = bid => {
    const tds=taskDefs.filter(t=>t.bucket===bid);
    let total=0,done=0,pending=0;
    tds.forEach(td=>{const s=tStats(td);total+=s.total;done+=s.done;pending+=s.pending+s.review+s.approved;});
    return {total,done,pending};
  };

  const setBucketFilter=(bid,patch)=>setBucketFilters(prev=>({...prev,[bid]:{...prev[bid],...patch}}));
  const setTaskOverride=(tid,patch)=>setTaskOverrides(prev=>({...prev,[tid]:{...(prev[tid]||bucketFilters[(taskDefs.find(t=>t.id===tid)||{}).bucket]||BLANK_FILTER),...patch}}));
  const clearTaskOverride=tid=>setTaskOverrides(prev=>{const n={...prev};delete n[tid];return n;});

  // Auto-save: whenever ct/clients/taskDefs/groups change, notify parent
  const saveToSharePoint=(newCt,newGroups,newTaskDefs,newClients)=>{
    if(p.onDataChange){
      p.onDataChange({
        ct:newCt||ct,
        groups:newGroups||groups,
        taskDefs:newTaskDefs||taskDefs,
        clients:newClients||clients,
        people: p.initialData.people, // preserve original people data with correct roles
        refLabels
      });
    }
  };
  const wrapCt=(fn)=>(prev=>{const next=fn(prev);saveToSharePoint(next,null,null,null);return next;});
  const wrapGroups=(fn)=>(prev=>{const next=fn(prev);saveToSharePoint(null,next,null,null);return next;});
  const wrapTaskDefs=(fn)=>(prev=>{const next=fn(prev);saveToSharePoint(null,null,next,null);return next;});
  const wrapClients=(fn)=>(prev=>{const next=fn(prev);saveToSharePoint(null,null,null,next);return next;});

  const toggleSub=(rowId,sid)=>setCt(wrapCt(prev=>prev.map(r=>r.id===rowId?{...r,st:r.st.map(s=>s.id===sid?{...s,d:!s.d}:s)}:r)));
  const addSub=(rowId,text)=>setCt(wrapCt(prev=>prev.map(r=>r.id===rowId?{...r,st:[...r.st,{id:uid(),t:text,d:false}]}:r)));
  // Workflow: if preparer === reviewer, a single action goes straight Pending -> Done (and back).
  // If they differ: preparer's action moves Pending -> Review; reviewer's action moves Review -> Done.
  // Helper: given a row, decide if closing needs a prompt
  // needsFilingPrompt: compliance tasks need date+ack when preparer marks Done (after approval)
  // needsAssessmentPrompt: assessment tasks need FY+refs when closing
  const needsFilingPrompt=(r)=>!!( taskDefs.find(t=>t.id===r.tid)||{}).isCompliance;
  const needsAssessmentPrompt=(r)=>( taskDefs.find(t=>t.id===r.tid)||{}).bucket==='assessment';

  const finaliseClose=(rowId, closeType, details)=>{
    setCt(prev=>prev.map(r=>{
      if(r.id!==rowId) return r;
      return {...r, status:'done', closedWithoutReview:closeType==='noApproval', resignNote:undefined, ...details};
    }));
    setClosingPrompt(null);
  };

  // Preparer marks Done after approval — triggers filing prompt if compliance/assessment
  const preparerMarkDone=(rowId)=>{
    const r=ct.find(x=>x.id===rowId);
    if(!r) return;
    if(needsFilingPrompt(r)||needsAssessmentPrompt(r)){
      setClosingPrompt({rowId, closeType:'withApproval'});
    } else {
      finaliseClose(rowId,'withApproval',{});
    }
  };

  const advanceStatus=(rowId, actorRole)=>{
    const r=ct.find(x=>x.id===rowId);
    if(!r) return;
    const samePerson=r.prep===r.rev;

    // Reopen from Done
    if(r.status==='done'){
      setCt(prev=>prev.map(x=>x.id===rowId?{...x,status:'pending',closedWithoutReview:false}:x));
      return;
    }

    if(samePerson){
      // Same person: Pending→Approved→Done (skip review step entirely)
      if(r.status==='pending'){ setCt(prev=>prev.map(x=>x.id===rowId?{...x,status:'approved'}:x)); return; }
      if(r.status==='approved'){ preparerMarkDone(rowId); return; }
      return;
    }

    if(actorRole==='preparer'){
      if(r.status==='pending'){ setCt(prev=>prev.map(x=>x.id===rowId?{...x,status:'review'}:x)); return; }
      if(r.status==='approved'){ preparerMarkDone(rowId); return; } // preparer files after approval
      if(r.status==='review'){ setCt(prev=>prev.map(x=>x.id===rowId?{...x,status:'pending'}:x)); return; } // undo submit
      return;
    }
    if(actorRole==='reviewer'){
      if(r.status==='review'){ setCt(prev=>prev.map(x=>x.id===rowId?{...x,status:'approved',resignNote:undefined}:x)); return; } // approve
      if(r.status==='approved'){ setCt(prev=>prev.map(x=>x.id===rowId?{...x,status:'review'}:x)); return; } // reviewer withdraws approval
      return;
    }
  };

  const resignToPreparer=(rowId, note)=>setCt(wrapCt(prev=>prev.map(r=>r.id===rowId?{...r,status:'pending',resignNote:note||'Sent back by reviewer for changes.'}:r)));
  const cancelTask=(rowId, reason)=>setCt(wrapCt(prev=>prev.map(r=>r.id===rowId?{...r,status:'cancelled',resignNote:reason||undefined}:r)));
  const selfComplete=(rowId, details)=>setCt(wrapCt(prev=>prev.map(r=>r.id===rowId?{...r,
    status:'done', prep:CURRENT_USER, rev:CURRENT_USER,
    filedDate:details.filedDate||undefined, ackNo:details.ackNo||undefined,
    resignNote:details.note||'Self-completed by reviewer.'
  }:r)));
  const reassignTask=(rowId, newPrep, newRev)=>{
    const pIdx=TEAM.findIndex(t=>t.id===newPrep);
    const rIdx=TEAM.findIndex(t=>t.id===newRev);
    setCt(wrapCt(prev=>prev.map(r=>r.id===rowId?{...r,prep:newPrep,rev:newRev,pi:pIdx>=0?pIdx:r.pi,ri:rIdx>=0?rIdx:r.ri}:r)));
  };

  // Reviewer personally files (approve + file in one step) — triggers filing prompt for compliance tasks
  const approveAndFile=(rowId)=>{
    const r=ct.find(x=>x.id===rowId);
    if(!r) return;
    if(needsFilingPrompt(r)||needsAssessmentPrompt(r)){
      setClosingPrompt({rowId, closeType:'approveAndFile'});
    } else {
      finaliseClose(rowId,'approveAndFile',{});
    }
  };

  // Close without approval: reviewer skips the normal approval step
  const closeWithoutReview=(rowId)=>{
    const r=ct.find(x=>x.id===rowId);
    if(!r) return;
    if(needsFilingPrompt(r)||needsAssessmentPrompt(r)){
      setClosingPrompt({rowId, closeType:'noApproval'});
    } else {
      finaliseClose(rowId,'noApproval',{});
    }
  };

  const toggleDone=(rowId)=>setCt(wrapCt(prev=>prev.map(r=>r.id===rowId?{...r,status:r.status==='done'?'pending':'done'}:r)));
  const updateFreqForClientTask=(cid,tid,freq)=>setCt(prev=>prev.map(r=>(r.cid===cid&&r.tid===tid)?{...r,freq}:r));
  const updateRowFilingInfo=(rowId,patch)=>setCt(wrapCt(prev=>prev.map(r=>r.id===rowId?{...r,...patch}:r)));
  const updateHearing=(rowId, newDate, note)=>{
    const today = new Date().toISOString().slice(0,10);
    setCt(prev=>{
      const next = prev.map(r=>{
        if(r.id!==rowId) return r;
        const logEntry = {
          prevDate: r.nextHearing||'',
          newDate,
          note: note||'',
          changedOn: today,
          changedBy: CURRENT_USER
        };

        e('span',{style:{fontSize:10,color:'var(--color-text-tertiary)'}},'FY:'),
        e('select',{value:complianceFY,onChange:ev=>setComplianceFY(ev.target.value),style:{fontSize:11,padding:'3px 7px',border:'0.5px solid var(--color-border-secondary)',borderRadius:'var(--border-radius-md)',background:'var(--color-background-primary)',cursor:'pointer'}},
          [e('option',{key:'all',value:'all'},'All years'),...fyOptions.map(fy=>e('option',{key:fy,value:fy},fy))]
        ),
        e('span',{style:{fontSize:10,color:'var(--color-text-tertiary)'}},'Month:'),
        e('select',{value:complianceMonth,onChange:ev=>setComplianceMonth(ev.target.value),style:{fontSize:11,padding:'3px 7px',border:'0.5px solid var(--color-border-secondary)',borderRadius:'var(--border-radius-md)',background:'var(--color-background-primary)',cursor:'pointer'}},
          [e('option',{key:'all',value:'all'},'All months'),...monthOptions.map(m=>e('option',{key:m,value:m},m))]
        ),
        e('span',{style:{fontSize:9,color:'var(--color-text-tertiary)',width:'100%'}},'Month filter only applies to monthly filings; quarterly/yearly filings are matched by FY.')
      ),

      e('div',{style:{display:'flex',gap:8,marginBottom:12}},
        e('div',{style:{flex:1,background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'7px 10px'}},
          e('div',{style:{fontSize:9,textTransform:'uppercase',letterSpacing:'.04em',color:'var(--color-text-tertiary)',marginBottom:3}},'Total filings'),
          e('div',{style:{fontSize:19,fontWeight:500,color:'var(--color-text-primary)'}},rows.length)
        ),
        e('div',{style:{flex:1,background:'#EAF3DE',borderRadius:'var(--border-radius-md)',padding:'7px 10px'}},
          e('div',{style:{fontSize:9,textTransform:'uppercase',letterSpacing:'.04em',color:'#27500A',marginBottom:3}},'Filed'),
          e('div',{style:{fontSize:19,fontWeight:500,color:'#27500A'}},filedCount)
        ),
        e('div',{style:{flex:1,background:'#FAECE7',borderRadius:'var(--border-radius-md)',padding:'7px 10px'}},
          e('div',{style:{fontSize:9,textTransform:'uppercase',letterSpacing:'.04em',color:'#993C1D',marginBottom:3}},'Not yet filed'),
          e('div',{style:{fontSize:19,fontWeight:500,color:'#993C1D'}},pendingCount)
        ),
        e('div',{style:{flex:1,background:closedWithoutReviewCount>0?'#FAEEDA':'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'7px 10px'}},
          e('div',{style:{fontSize:9,textTransform:'uppercase',letterSpacing:'.04em',color:closedWithoutReviewCount>0?'#633806':'var(--color-text-tertiary)',marginBottom:3}},'Closed without review'),
          e('div',{style:{fontSize:19,fontWeight:500,color:closedWithoutReviewCount>0?'#633806':'var(--color-text-primary)'}},closedWithoutReviewCount)
        )
      ),

      rows.length===0 ? e('div',{style:{padding:24,textAlign:'center',fontSize:12,color:'var(--color-text-tertiary)'}},'No compliance filings match this filter.') :
      e('div',{style:{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',overflow:'hidden'}},
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 110px 80px 70px 90px 130px 80px',gap:8,padding:'6px 10px',background:'#EEEDFE',fontSize:9,textTransform:'uppercase',letterSpacing:'.04em',color:'#534AB7'}},
          e('div',null,'Client'),e('div',null,'Filing'),e('div',null,'Period'),e('div',null,'Due'),e('div',null,'Filed date'),e('div',null,'Ack. number'),e('div',null,'Status')
        ),
        rows.sort((a,b)=>(a.cid||'').localeCompare(b.cid||'')).map(r=>{
          const cdef=clients.find(c=>c.id===r.cid);
          const td=taskDefs.find(t=>t.id===r.tid);
          const filed=!!r.filedDate;
          return e('div',{key:r.id,style:{display:'grid',gridTemplateColumns:'1fr 110px 80px 70px 90px 130px 80px',gap:8,alignItems:'center',padding:'6px 10px',borderTop:'0.5px solid var(--color-border-tertiary)',background:r.closedWithoutReview?'#FAEEDA':'transparent'}},
            e('div',{style:{fontSize:12,color:'var(--color-text-primary)',display:'flex',alignItems:'center',gap:4}},
              cdef?cdef.name:(r.cid||'—'),
              r.closedWithoutReview?e('i',{className:'ti ti-shield-x',title:'Closed without reviewer sign-off',style:{fontSize:11,color:'#D85A30'},'aria-label':'Closed without review'}):null
            ),
            e('div',{style:{fontSize:11,color:'var(--color-text-secondary)'}},td?td.label:r.tid),
            e('div',{style:{fontSize:11,color:'var(--color-text-tertiary)'}},r.period||'—'),
            e('div',{style:{fontSize:11,color:r.od?'#993C1D':'var(--color-text-tertiary)'}},r.due),
            e('input',{style:inputSmall,placeholder:'dd Mon',value:r.filedDate||'',onChange:ev=>updateRowFilingInfo(r.id,{filedDate:ev.target.value})}),
            e('input',{style:inputSmall,placeholder:'Ack. no.',value:r.ackNo||'',onChange:ev=>updateRowFilingInfo(r.id,{ackNo:ev.target.value})}),
            e('span',{style:{fontSize:9,padding:'2px 7px',borderRadius:20,background:filed?'#EAF3DE':'#FAEEDA',color:filed?'#27500A':'#633806',textAlign:'center',whiteSpace:'nowrap'}},filed?'Filed':'Pending')
          );
        })
      ),

      e('div',{style:{marginTop:14,paddingTop:12,borderTop:'0.5px solid var(--color-border-tertiary)'}},
        e('div',{style:{fontSize:10,color:'var(--color-text-tertiary)',marginBottom:6}},'Which task types count as a tracked compliance filing:'),
        e('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
          taskDefs.map(td=>e('label',{key:td.id,style:{fontSize:10,display:'flex',alignItems:'center',gap:4,padding:'3px 8px',border:'0.5px solid var(--color-border-tertiary)',borderRadius:20,cursor:'pointer',color:td.isCompliance?'#534AB7':'var(--color-text-secondary)',background:td.isCompliance?'#EEEDFE':'transparent'}},
            e('input',{type:'checkbox',checked:!!td.isCompliance,onChange:()=>toggleTaskCompliance(td.id),style:{margin:0}}),
            td.label
          ))
        )
      )
    );
  };

  // Mirrors renderContent's active filters to determine what's "on screen" right now, for export.
  const getVisibleRows=()=>{
    if(view==='assessment'){
      let rows=ct.filter(r=>{const td=taskDefs.find(t=>t.id===r.tid); return td && td.bucket==='assessment';});
      if(assessmentFYFilter!=='all') rows=rows.filter(r=>r.fy===assessmentFYFilter);
      if(assessmentRefFilter.query.trim()){
        const q=assessmentRefFilter.query.trim().toLowerCase();
        const field=assessmentRefFilter.field;
        rows=rows.filter(r=>{
          if(field==='all') return [r.ref1,r.ref2,r.ref3].some(v=>(v||'').toLowerCase().includes(q));
          return (r[field]||'').toLowerCase().includes(q);
        });
      }
      return rows;
    }
    if(view==='compliance'){
      let rows=ct.filter(r=>{ const td=taskDefs.find(t=>t.id===r.tid); return td && td.isCompliance; });
      if(complianceTypeFilter!=='all') rows=rows.filter(r=>r.tid===complianceTypeFilter);
      if(complianceClientFilter!=='all') rows=rows.filter(r=>r.cid===complianceClientFilter);
      if(complianceFY!=='all') rows=rows.filter(r=>periodToFY(r.period)===complianceFY);
      if(complianceMonth!=='all') rows=rows.filter(r=>periodToMonthLabel(r.period)===complianceMonth);
      return rows;
    }
    if(view==='clients'){
      const relevantClients = focusClient ? clients.filter(c=>c.id===focusClient) : clients;
      const cids=relevantClients.map(c=>c.id);
      return ct.filter(r=>cids.includes(r.cid)).filter(r=>{
        const td=taskDefs.find(t=>t.id===r.tid);
        if(!td) return true;
        return filtForTask([r],td).length>0;
      });
    }
    if(view==='dashboard'){
      const tdList= bucket ? taskDefs.filter(t=>t.bucket===bucket) : taskDefs;
      const tids=tdList.map(t=>t.id);
      return ct.filter(r=>tids.includes(r.tid)).filter(r=>{
        const td=taskDefs.find(t=>t.id===r.tid);
        if(!td) return true;
        return filtForTask([r],td).length>0;
      });
    }
    const groupMatch=groups.find(g=>g.id===view);
    if(groupMatch){
      const tids=taskDefs.filter(t=>t.group===view).map(t=>t.id);
      return ct.filter(r=>tids.includes(r.tid));
    }
    // Dynamic team map — keyed by person ID from People sheet
    const teamMap2={};
    TEAM.forEach(t=>{ teamMap2[t.id]=t.id; });
    if(teamMap2[view]){
      const mid=teamMap2[view];
      return ct.filter(x=>x.rev===mid||x.prep===mid).filter(x=>{
        if(!periodMatchesFilter(x.period, teamFilter)) return false;
        if((teamFilter.status||'all')!=='all' && x.status!==teamFilter.status) return false;
        return true;
      });
    }
    return ct;
  };

  const handleExportVisible=()=>exportToExcel(getVisibleRows(), taskDefs, clients, groups, 'worktrack_visible_'+Date.now()+'.xlsx');
  const handleExportAll=()=>exportToExcel(ct, taskDefs, clients, groups, 'worktrack_all_'+Date.now()+'.xlsx');

  const renderContent=()=>{
    if(view==='assessment'){
      return e(React.Fragment,null,
        e('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:12,marginBottom:8}},BcPart('Dashboard',()=>goView('dashboard')),BcPart('Assessment tracking')),
        AssessmentView()
      );
    }
    if(view==='compliance'){
      return e(React.Fragment,null,
        e('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:12,marginBottom:8}},BcPart('Dashboard',()=>goView('dashboard')),BcPart('Compliance history')),
        ComplianceView()
      );
    }
    if(view==='clients'){
      const cd=focusClient?clients.find(c=>c.id===focusClient):null;
      return e(React.Fragment,null,
        e('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:12,flexWrap:'wrap',marginBottom:8}},
          BcPart('Dashboard',()=>goView('dashboard')),
          focusClient?e(React.Fragment,{key:'f'},BcPart('Clients',()=>{setFocusClient(null);setExpCC(null);}),BcPart(cd?cd.name:'')):BcPart('Clients')
        ),
        ClientsView()
      );
    }
    if(view==='dashboard'){
      const tdList=bucket?taskDefs.filter(t=>t.bucket===bucket):taskDefs;
      const bi=bucket?BUCKETS.find(b=>b.id===bucket):null;
      const s=bucket?bStats(bucket):null;
      return e(React.Fragment,null,
        e('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:12,marginBottom:8}},
          bucket?e(React.Fragment,{key:'b'},BcPart('Dashboard',()=>setBucket(null)),BcPart(bi.label)):BcPart('Dashboard')
        ),
        bucket?e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,padding:'8px 10px',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',flexWrap:'wrap',gap:8}},
          e('div',{style:{fontSize:10,color:'var(--color-text-tertiary)'}},'Default filter for all '+bi.label.toLowerCase()+' tasks (tasks can override below):'),
          e(MiniFilterBar,{filter:bucketFilters[bucket],onChange:patch=>setBucketFilter(bucket,patch)})
        ):null,
        bucket&&s?e('div',{style:{display:'flex',gap:8,marginBottom:12}},
          ['Total','Pending','Done'].map((lbl,i)=>e('div',{key:lbl,style:{flex:1,background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'7px 10px'}},
            e('div',{style:{fontSize:9,textTransform:'uppercase',letterSpacing:'.04em',color:'var(--color-text-tertiary)',marginBottom:3}},lbl),
            e('div',{style:{fontSize:19,fontWeight:500,color:i===1?'#993C1D':i===2?'#27500A':'var(--color-text-primary)'}},[s.total,s.pending,s.done][i])
          ))
        ):null,
        !bucket?e('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:14}},
          BUCKETS.map(b=>{const s=bStats(b.id);return e('div',{key:b.id,onClick:()=>setBucket(b.id),style:{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',padding:'10px 11px',cursor:'pointer'}},
            e('div',{style:{fontSize:10,color:'var(--color-text-secondary)',marginBottom:4}},e('i',{className:'ti '+b.icon,style:{fontSize:10,marginRight:4},'aria-hidden':'true'}),b.label),
            e('div',{style:{fontSize:22,fontWeight:500,color:'var(--color-text-primary)'}},s.total),
            e('div',{style:{fontSize:9,color:'var(--color-text-tertiary)',marginTop:6}},(()=>{const bf=bucketFilters[b.id];const parts=[];if((bf.fy||'all')!=='all')parts.push(bf.fy);if((bf.quarter||'all')!=='all')parts.push(bf.quarter);if((bf.month||'all')!=='all')parts.push(bf.month);if((bf.urgency||'all')!=='all')parts.push(URGENCY_BUCKETS.find(u=>u.id===bf.urgency)?.label||bf.urgency);if((bf.status||'all')!=='all')parts.push(bf.status);return parts.length?'Filter: '+parts.join(' · '):'No filter set';})()),
            e('div',{style:{fontSize:9,color:'var(--color-text-tertiary)',marginTop:5}},'Tap to drill down →')
          );})
        ):null,
        GroupedTasks(tdList)
      );
    }
    const vmap={};
    groups.forEach(g=>{vmap[g.id]={label:g.label,td:taskDefs.filter(t=>t.group===g.id)};});
    if(vmap[view]){
      const vm=vmap[view];
      return e(React.Fragment,null,
        e('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:12,marginBottom:8}},BcPart('Dashboard',()=>goView('dashboard')),BcPart(vm.label)),
        GroupedTasks(vm.td)
      );
    }
    const teamMap={};
    TEAM.forEach(t=>{ teamMap[t.id]=t; });
    if(teamMap[view]){
      const member=teamMap[view];
      return e(React.Fragment,null,
        e('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:12,marginBottom:8}},BcPart('Dashboard',()=>goView('dashboard')),BcPart(member.name+"'s tasks")),
        TeamView(member)
      );
    }
    return null;
  };

  return e(React.Fragment,null,
  showAddModal ? e(AddTaskModal,{
    taskDefs,clients,groups,ct,team:TEAM,
    isReviewer: p.currentUser?.isReviewer,
    onClose:()=>setShowAddModal(false),
    onCreateTaskType:handleCreateTaskType,
    onAddAssignment:handleAddAssignment,
    onCreateGroup:handleCreateGroup,
    onAddClient:handleAddClient,
  }) : null,
  showAddClientModal ? e(AddClientModal,{
    client:editingClient,
    onSave:(name,freq)=>{
      if(editingClient){ handleRenameClient(editingClient.id, name); updateClientFreq(editingClient.id, freq); }
      else { handleAddClient(name, freq); }
    },
    onClose:()=>{ setShowAddClientModal(false); setEditingClient(null); }
  }) : null,
  reassignRow ? e(ReassignModal,{
    row:reassignRow, team:TEAM,
    taskDef:taskDefs.find(t=>t.id===reassignRow.tid),
    onSave:(prep,rev)=>reassignTask(reassignRow.id,prep,rev),
    onClose:()=>setReassignRow(null)
  }) : null,
  selfCompleteRow ? e(SelfCompleteModal,{
    row:selfCompleteRow,
    isCompliance:!!(taskDefs.find(t=>t.id===selfCompleteRow.tid)||{}).isCompliance,
    onSave:(details)=>selfComplete(selfCompleteRow.id,details),
    onClose:()=>setSelfCompleteRow(null)
  }) : null,
  cancelRow ? e(CancelTaskModal,{
    row:cancelRow,
    onSave:(reason)=>cancelTask(cancelRow.id,reason),
    onClose:()=>setCancelRow(null)
  }) : null,
  bulkCreateTask ? e(BulkCreateModal,{
    taskDef:bulkCreateTask,
    clients,ct,
    onClose:()=>setBulkCreateTask(null),
    onCreate:handleBulkCreate
  }) : null,
  showExcelModal ? e(ExcelImportModal,{
    onClose:()=>setShowExcelModal(false),
    onImport:handleExcelImport
  }) : null,
  closingPrompt ? (()=>{
    const row=ct.find(r=>r.id===closingPrompt.rowId);
    const taskDef=row?taskDefs.find(t=>t.id===row.tid)||{}:{};
    return row ? e(ClosingPromptModal,{
      row, taskDef, refLabels,
      closeType:closingPrompt.closeType,
      onConfirm:(details)=>finaliseClose(closingPrompt.rowId, closingPrompt.closeType, details),
      onCancel:()=>setClosingPrompt(null)
    }) : null;
  })() : null,
  e('div',{style:{display:'flex',height:680,border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-lg)',overflow:'hidden',background:'var(--color-background-primary)',fontFamily:'var(--font-sans)'}},
    e('div',{style:{width:180,minWidth:180,borderRight:'0.5px solid var(--color-border-tertiary)',background:'var(--color-background-secondary)',display:'flex',flexDirection:'column',overflowY:'auto'}},
      e('div',{style:{padding:'10px 12px',borderBottom:'0.5px solid var(--color-border-tertiary)'}},
        e('div',{style:{fontSize:13,fontWeight:500,color:'var(--color-text-primary)'}},'WorkTrack'),
        e('div',{style:{fontSize:10,color:'var(--color-text-tertiary)'}},CONFIG.orgName+' · '+CURRENT_USER)
      ),
      e('div',{style:{padding:'3px 10px',fontSize:10,color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'.05em',marginTop:10}},'Views'),
      sbItem('dashboard','Dashboard'),sbItem('clients','Clients'),sbItem('compliance','Compliance history'),sbItem('assessment','Assessment tracking'),
      e('div',{style:{padding:'3px 10px',fontSize:10,color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'.05em',marginTop:10}},'Work type'),
      ...groups.map(g=>sbItem(g.id,g.label)),
      e('div',{style:{padding:'3px 10px',fontSize:10,color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'.05em',marginTop:10}},'Team'),
      ...TEAM.map(t=>sbItem(t.id, t.id===CURRENT_USER ? t.name+' (you)' : t.name)),
      e('div',{style:{padding:'8px 12px',borderTop:'0.5px solid var(--color-border-tertiary)',marginTop:'auto'}},
        e('div',{style:{display:'flex',alignItems:'center',gap:7}},
          e(Av,{idx:0,label:(p.currentUser?p.currentUser.name:'RK').slice(0,2).toUpperCase(),size:24}),
          e('div',{style:{flex:1}},
            e('div',{style:{fontSize:11,fontWeight:500,color:'var(--color-text-primary)'}},p.currentUser?p.currentUser.name:'Raj Kumar'),
            e('div',{style:{fontSize:9,color:'var(--color-text-tertiary)'}},p.currentUser&&p.currentUser.isReviewer?'Reviewer':'Preparer')
          )
        ),
        e('button',{onClick:p.onSignOut,style:{marginTop:6,width:'100%',fontSize:10,padding:'4px',border:'0.5px solid var(--color-border-secondary)',borderRadius:'var(--border-radius-md)',background:'transparent',color:'var(--color-text-tertiary)',cursor:'pointer'}},'Sign out')
      )
    ),
    e('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}},
      e('div',{style:{display:'flex',alignItems:'center',justifyContent:'flex-end',padding:'8px 14px',borderBottom:'0.5px solid var(--color-border-tertiary)',flexShrink:0,gap:8,flexWrap:'wrap'}},
        e(Btn,{onClick:()=>setShowExcelModal(true)},e('i',{className:'ti ti-file-spreadsheet','aria-hidden':'true'}),'Import Excel'),
        e(Btn,{onClick:handleExportVisible},e('i',{className:'ti ti-download','aria-hidden':'true'}),'Export visible'),
        e(Btn,{onClick:handleExportAll},e('i',{className:'ti ti-download','aria-hidden':'true'}),'Export all'),
        e(Btn,{pri:true,onClick:()=>setShowAddModal(true)},e('i',{className:'ti ti-plus','aria-hidden':'true'}),'Add task')
      ),
      e('div',{style:{flex:1,overflowY:'auto',padding:'12px 14px'}},renderContent())
    )
  )
  );
}


ReactDOM.createRoot(document.getElementById('wt-root')).render(e(App));
}

if(window.React&&window.ReactDOM&&window.XLSX&&window.msal){boot();}
else{let t=0;const iv=setInterval(()=>{t++;if(window.React&&window.ReactDOM&&window.XLSX&&window.msal){clearInterval(iv);boot();}else if(t>100){clearInterval(iv);}},100);}
})();
</script>
</body>
</html>
